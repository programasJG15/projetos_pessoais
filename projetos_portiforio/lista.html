<!-- to-do list -->
<html>
    <head>
        <title>lista de tarefas</title>
            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
            <style>
                 body {
            background: linear-gradient(135deg, rgb(96, 96, 189),#1e3c72, #2a5298, white);
            height: 100vh;
            align-items: center;
            justify-content: center;
        }
                .container{
                    justify-content: center;
                    align-items: center;
                    margin-top: 20px;
                    gap: 10px;
                }
                ul {
                    list-style: disc;
                    font-size: 25px;
                    text-align: left;
                    border-top: 100px solid transparent;
                    font-weight: bold;
                }
            h1{
                text-align: center;
                font-size: 50px;
                font-style:italic;
            }
            input{
                align-items: center;
                width: 300px;
                height: 40px;
                font-size: 20px;
            }
                
            button:hover{
                background-color: rgb(8, 8, 245);
                color: rgb(253, 252, 252);
            }
    
            </style>
    </head>
    <body>
        <h1>Lista de tarefas</h1>
        <div class="container">
        <input type="text" id="tarefa" placeholder="digite a tarefa">
        <input type="datetime-local" id="data">
        <!-- botao de adicionar -->
        <button class="btn btn-primary" id="add">Adicionar</button>
         <!-- lista de tarefas -->
          <ul id="lista-tarefas"></ul>
          <script src="lista.js"></script>
    </body>
</html>
